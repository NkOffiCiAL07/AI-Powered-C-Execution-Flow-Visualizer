<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Traceon - C++ Execution Flow Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "on-background": "#e5e1e4",
              "tertiary-fixed-dim": "#d2bfe8",
              "on-error-container": "#ffdad6",
              "secondary-fixed": "#e1e0ff",
              "tertiary-fixed": "#eddcff",
              "surface-bright": "#39393b",
              "primary-fixed-dim": "#ddb7ff",
              "surface-container-low": "#1c1b1d",
              "on-surface-variant": "#cfc2d6",
              "on-secondary-fixed-variant": "#2f2ebe",
              "on-secondary-container": "#b0b2ff",
              "surface-dim": "#131315",
              "on-tertiary-fixed-variant": "#4f4062",
              "background": "#131315",
              "on-primary-fixed": "#2c0051",
              "primary-container": "#b76dff",
              "surface-container": "#201f22",
              "tertiary-container": "#9b8ab0",
              "on-secondary-fixed": "#07006c",
              "primary-fixed": "#f0dbff",
              "on-primary-container": "#400071",
              "secondary-container": "#3131c0",
              "outline-variant": "#4d4354",
              "surface-container-high": "#2a2a2c",
              "secondary-fixed-dim": "#c0c1ff",
              "on-surface": "#e5e1e4",
              "error-container": "#93000a",
              "on-secondary": "#1000a9",
              "primary": "#ddb7ff",
              "surface-container-highest": "#353437",
              "surface": "#131315",
              "on-tertiary-fixed": "#221534",
              "surface-tint": "#ddb7ff",
              "secondary": "#c0c1ff",
              "on-tertiary-container": "#312343",
              "inverse-surface": "#e5e1e4",
              "inverse-on-surface": "#313032",
              "outline": "#988d9f",
              "on-primary": "#490080",
              "surface-variant": "#353437"
            },
            "borderRadius": {
              "DEFAULT": "0.125rem",
              "lg": "0.25rem",
              "xl": "0.5rem",
              "full": "0.75rem"
            },
            "spacing": {
              "gutter": "24px",
              "unit": "4px",
              "margin-desktop": "48px",
              "section-gap": "120px",
              "margin-mobile": "16px",
              "container-max": "1280px"
            },
            "fontFamily": {
              "label-sm": ["JetBrains Mono"],
              "body-lg": ["Inter"],
              "headline-lg-mobile": ["Inter"],
              "code-md": ["JetBrains Mono"],
              "headline-xl": ["Space Grotesk"],
              "headline-md": ["Space Grotesk"],
              "headline-lg": ["Space Grotesk"],
              "body-md": ["Inter"],
              "sans": ["Inter", "sans-serif"],
              "display": ["Space Grotesk", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"]
            }
          },
        },
      }
    </script>
    <style>
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-20px) scale(1.05); }
      }
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
        50% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.6); }
      }
      @keyframes scanline {
        from { transform: translateY(-100%); }
        to { transform: translateY(100%); }
      }
      @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
        100% { transform: translate(0); }
      }
      .animate-fade-up {
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      .animate-pulse-glow {
        animation: pulseGlow 3s ease-in-out infinite;
      }
      .glitch-hover:hover {
        animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
        text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff;
      }
      .cyber-grid {
        background-image:
          linear-gradient(rgba(201, 106, 72, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(201, 106, 72, 0.06) 1px, transparent 1px);
        background-size: 40px 40px;
        perspective: 1000px;
        transform-style: preserve-3d;
      }
      .hud-corner {
        position: absolute;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(201, 106, 72, 0.3);
      }
      .hud-corner-tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
      .hud-corner-tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
      .hud-corner-bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
      .hud-corner-br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }
      
      .glass-panel {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .glass-panel:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(168, 85, 247, 0.4);
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(168, 85, 247, 0.1);
      }
      .neon-bloom {
        filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.5));
      }
      .scan-effect::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, transparent, rgba(168, 85, 247, 0.05), transparent);
        animation: scanline 6s linear infinite;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
