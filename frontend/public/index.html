    <style>
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-20px) scale(1.05); }
      }
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
        50% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.6); }
      }
      @keyframes scanline {
        from { transform: translateY(-100%); }
        to { transform: translateY(100%); }
      }
      @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
        100% { transform: translate(0); }
      }
      .animate-fade-up {
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      .animate-pulse-glow {
        animation: pulseGlow 3s ease-in-out infinite;
      }
      .glitch-hover:hover {
        animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
        text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff;
      }
      .cyber-grid {
        background-image:
          linear-gradient(rgba(201, 106, 72, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(201, 106, 72, 0.06) 1px, transparent 1px);
        background-size: 40px 40px;
        perspective: 1000px;
        transform-style: preserve-3d;
      }
      .hud-corner {
        position: absolute;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(201, 106, 72, 0.3);
      }
      .hud-corner-tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
      .hud-corner-tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
      .hud-corner-bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
      .hud-corner-br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }
      
      .glass-panel {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .glass-panel:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(168, 85, 247, 0.4);
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(168, 85, 247, 0.1);
      }
      .neon-bloom {
        filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.5));
      }
      .scan-effect::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, transparent, rgba(168, 85, 247, 0.05), transparent);
        animation: scanline 6s linear infinite;
        pointer-events: none;
      }
